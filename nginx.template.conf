worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  
  # Límite crucial de Dokploy/Nixpacks para fotos pesadas 4K
  client_max_body_size 25M;

  server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /app/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    location / {
      try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
      
      # Pasar todos los parámetros por defecto de FastCGI
      include fastcgi_params;
      
      # [CRÍTICO] Parametros para que Laravel (CORS/Sanctum) detecte HTTPS 
      # a través del túnel de Traefik y no bloquee el frontend
      fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
      fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
      fastcgi_param HTTP_X_FORWARDED_HOST $host;
      fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
      fastcgi_param REMOTE_ADDR $remote_addr;
      
      fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
      deny all;
    }
  }
}
